apiVersion: apps/v1
kind: Deployment
metadata:
  name: topology-spread-demo
  namespace: gratitudeapp-scheduling-lab
spec:
  replicas: 4
  selector:
    matchLabels:
      app: gratitudeapp
      feature: topology-spread
  template:
    metadata:
      labels:
        app: gratitudeapp
        feature: topology-spread
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gratitudeapp
              feature: topology-spread
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gratitudeapp
              feature: topology-spread
      containers:
        - name: topology-spread-demo
          image: nginx:1.27
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
